name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g. v1.0.0)

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Runs on macOS to compile .dmg
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # Runs on Linux to compile .deb / .appimage
            args: ""
          - platform: "windows-latest" # Runs on Windows to compile .exe (MSI)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libsoup2.4-dev curl wget libappindicator3-dev patchelf librsvg2-dev

      - name: Install App dependencies
        run: |
          cd app
          npm install

      - name: Build and Publish using Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For ad-hoc self signing we do not enforce code signing certificates during build
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: app-v__VERSION__ # e.g. app-v1.0.0
          releaseName: "DopaMind v__VERSION__"
          releaseBody: "DopaMind production build for native platforms. For macOS users, please Right-Click and select Open to bypass Gatekeeper warning."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: "./app"
